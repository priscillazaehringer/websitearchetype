<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's Your Brand Archetype? | Brand Archetype Quiz</title>
  <meta name="description" content="Take the free brand archetype quiz and discover your design system, color palettes, and website personality in minutes.">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: #1E1038; min-height: 100vh; }

    /* Progress */
    .prog-wrap { padding: 14px 24px 0; }
    .prog-track { height: 3px; background: rgba(255,253,247,0.1); overflow: visible; position: relative; }
    .prog-fill { height: 100%; background: #E8346B; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); position: relative; }

    /* Progress sparkle particles */
    .prog-sparkle {
      position: absolute; right: -2px; top: 50%;
      width: 0; height: 0; pointer-events: none;
    }
    .prog-sparkle .spark {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      background: #E8346B; opacity: 0;
    }
    .prog-sparkle.burst .spark {
      animation: sparkBurst 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .prog-sparkle .spark:nth-child(1) { --sx: -6px; --sy: -12px; animation-delay: 0s; background: #FFD23F; }
    .prog-sparkle .spark:nth-child(2) { --sx: 8px; --sy: -10px; animation-delay: 0.03s; background: #E8346B; }
    .prog-sparkle .spark:nth-child(3) { --sx: -3px; --sy: -16px; animation-delay: 0.06s; background: #C4B5FD; }
    .prog-sparkle .spark:nth-child(4) { --sx: 5px; --sy: -8px; animation-delay: 0.02s; background: #FFD23F; }
    .prog-sparkle .spark:nth-child(5) { --sx: -8px; --sy: -6px; animation-delay: 0.05s; background: #E8346B; width: 2px; height: 2px; }
    .prog-sparkle .spark:nth-child(6) { --sx: 3px; --sy: -14px; animation-delay: 0.04s; background: #C4B5FD; width: 2px; height: 2px; }
    @keyframes sparkBurst {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
    }
    .prog-label { font-family: var(--font-hand); font-size: 13px; color: rgba(255,253,247,0.4); margin-top: 6px; font-weight: 600; }

    /* Screens */
    .screen { display: none; padding: 28px 24px 40px; animation: slideInRight 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }
    .screen.active { display: block; }
    .screen.slide-out { animation: slideOutLeft 0.3s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideInRight { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideOutLeft { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-40px); } }

    /* Question */
    .q-eyebrow { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: #E8346B; font-weight: 600; margin-bottom: 12px; }
    .q-text { font-family: var(--font-serif); font-weight: 700; font-size: 1.4rem; color: #FFFDF7; line-height: 1.35; margin-bottom: 8px; }
    .q-hint { font-family: var(--font-hand); font-size: 17px; color: rgba(196,181,253,0.65); margin-bottom: 24px; font-weight: 600; }
    .q-opts { display: flex; flex-direction: column; gap: 8px; }
    .q-opt {
      display: block; width: 100%; padding: 15px 18px;
      background: rgba(255,253,247,0.04); border: 1.5px solid rgba(255,253,247,0.12);
      color: #FFFDF7; font-family: var(--font-sans); font-size: 13px; font-weight: 400;
      line-height: 1.5; text-align: left; cursor: pointer;
      transition: all 0.18s ease;
      position: relative; overflow: hidden;
    }
    .q-opt::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(232,52,107,0.08) 50%, transparent 60%);
      transform: translateX(-100%); transition: none;
    }
    .q-opt:hover::before { transform: translateX(100%); transition: transform 0.6s ease; }
    .q-opt:hover { background: rgba(232,52,107,0.1); border-color: #E8346B; transform: translateX(4px); box-shadow: 0 0 20px rgba(232,52,107,0.12), inset 0 0 20px rgba(232,52,107,0.03); }
    .q-opt.picked { background: rgba(232,52,107,0.15); border-color: #E8346B; font-weight: 600; animation: optionPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes optionPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.035); box-shadow: 0 0 24px rgba(232,52,107,0.3); }
      100% { transform: scale(1); box-shadow: none; }
    }
    .q-opt:disabled { cursor: default; }

    /* Resume banner */
    .resume-banner {
      margin: 16px 24px 0;
      padding: 14px 18px;
      background: rgba(255,210,63,0.08);
      border: 1.5px solid rgba(255,210,63,0.3);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .resume-text { font-size: 13px; color: rgba(255,253,247,0.7); font-family: var(--font-hand); font-size: 16px; font-weight: 600; }
    .resume-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .resume-yes, .resume-no {
      padding: 6px 14px; font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: var(--font-sans); letter-spacing: 0.5px;
    }
    .resume-yes { background: #FFD23F; color: #1a1a2e; border: none; }
    .resume-no { background: transparent; color: rgba(255,253,247,0.4); border: 1px solid rgba(255,253,247,0.15); }

    /* Email gate */
    .email-wrap { text-align: center; padding: 40px 24px; }
    .email-eyebrow { font-family: var(--font-hand); font-size: 18px; color: #FFD23F; font-weight: 600; margin-bottom: 12px; }
    .email-headline { font-family: var(--font-serif); font-weight: 900; font-size: 1.9rem; color: #FFFDF7; line-height: 1.1; margin-bottom: 10px; }
    .email-sub { font-size: 13px; color: rgba(255,253,247,0.55); margin-bottom: 28px; line-height: 1.7; max-width: 380px; margin-left: auto; margin-right: auto; }
    .email-input {
      display: block; width: 100%; max-width: 360px; margin: 0 auto 10px;
      padding: 15px 18px; border: 1.5px solid rgba(255,253,247,0.2);
      background: rgba(255,253,247,0.07); color: #FFFDF7;
      font-family: var(--font-sans); font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .email-input::placeholder { color: rgba(255,253,247,0.3); }
    .email-input:focus { border-color: #E8346B; }
    .email-input.error { border-color: #E8346B; animation: shake 0.3s ease; }
    @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-6px); } 75% { transform:translateX(6px); } }
    .email-btn {
      display: block; width: 100%; max-width: 360px; margin: 0 auto 12px;
      padding: 16px; background: #E8346B; color: #FFFDF7;
      font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .email-btn:hover { background: #d42a5c; transform: translateY(-2px); }
    .email-note { font-size: 11px; color: rgba(255,253,247,0.25); }

    /* Calculating */
    .calc-wrap { text-align: center; padding: 80px 24px; }
    .calc-spinner-container { position: relative; width: 90px; height: 90px; margin: 0 auto 24px; }
    .calc-spinner {
      position: absolute; left: 50%; top: 50%; width: 44px; height: 44px;
      margin: -22px 0 0 -22px;
      border: 3px solid rgba(232,52,107,0.2); border-top-color: #E8346B;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    .calc-ring {
      position: absolute; border-radius: 50%; border: 1.5px solid transparent;
    }
    .calc-ring-1 {
      inset: 0; border-top-color: rgba(232,52,107,0.25); border-right-color: rgba(232,52,107,0.1);
      animation: spin 3s linear infinite reverse;
    }
    .calc-ring-2 {
      inset: 8px; border-bottom-color: rgba(196,181,253,0.2); border-left-color: rgba(196,181,253,0.1);
      animation: spin 2s linear infinite;
    }
    .calc-ring-3 {
      inset: 16px; border-top-color: rgba(255,210,63,0.15);
      animation: spin 2.5s linear infinite reverse;
    }
    .calc-dot {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: #E8346B; top: 50%; left: 50%; margin: -2px 0 0 -2px;
    }
    .calc-dot-1 { animation: orbitDot 2s linear infinite; }
    .calc-dot-2 { animation: orbitDot 2s linear infinite 0.67s; background: #C4B5FD; }
    .calc-dot-3 { animation: orbitDot 2s linear infinite 1.33s; background: #FFD23F; }
    @keyframes orbitDot {
      0% { transform: rotate(0deg) translateX(38px) scale(1); opacity: 0.8; }
      50% { transform: rotate(180deg) translateX(38px) scale(0.6); opacity: 0.3; }
      100% { transform: rotate(360deg) translateX(38px) scale(1); opacity: 0.8; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .calc-title { font-family: var(--font-serif); font-weight: 900; font-size: 1rem; color: #E8346B; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; animation: calcPulse 1.5s ease-in-out infinite; }
    @keyframes calcPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .calc-sub { font-family: var(--font-hand); font-size: 18px; color: rgba(255,253,247,0.4); font-weight: 600; transition: opacity 0.3s ease; }

    /* Reveal screen */
    .reveal-wrap { text-align: center; padding: 50px 24px 40px; }
    .reveal-eyebrow { font-family: var(--font-hand); font-size: 18px; color: #FFD23F; font-weight: 600; margin-bottom: 16px; opacity: 0; animation: revealFade 0.6s ease 0.2s forwards; }
    .reveal-the { font-family: var(--font-serif); font-weight: 900; font-size: 1.4rem; color: rgba(255,253,247,0.5); line-height: 1; margin-bottom: 4px; opacity: 0; animation: revealFade 0.5s ease 0.5s forwards; }
    .reveal-name { font-family: var(--font-serif); font-weight: 900; font-size: 3.2rem; color: #E8346B; line-height: 1; letter-spacing: -1px; margin-bottom: 20px; opacity: 0; animation: revealPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.8s forwards; }
    .reveal-teaser { font-size: 14px; color: rgba(255,253,247,0.6); line-height: 1.75; max-width: 380px; margin: 0 auto 32px; opacity: 0; animation: revealFade 0.6s ease 1.2s forwards; }
    .reveal-divider { width: 40px; height: 2px; background: rgba(232,52,107,0.3); margin: 0 auto 28px; opacity: 0; animation: revealFade 0.5s ease 1.5s forwards; }
    .reveal-inbox { font-family: var(--font-serif); font-weight: 700; font-size: 1.1rem; color: #FFFDF7; margin-bottom: 8px; opacity: 0; animation: revealFade 0.5s ease 1.7s forwards; }
    .reveal-inbox-sub { font-size: 13px; color: rgba(255,253,247,0.4); line-height: 1.6; max-width: 320px; margin: 0 auto; opacity: 0; animation: revealFade 0.5s ease 1.9s forwards; }
    @keyframes revealFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes revealPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

  <nav class="quiz-nav">
    <a href="index.html" class="quiz-nav-logo"><img src="logo.svg" alt="Brand Archetype Quiz" style="height:24px;"></a>
  </nav>

  <div id="resumeBanner" style="display:none;"></div>

  <div class="prog-wrap" id="progWrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:6.67%"></div></div>
    <div class="prog-label" id="progLabel">question 1 of 15</div>
  </div>

  <div id="screensOuter"></div>

  <script src="quiz.js"></script>
  <script>
    let answers = new Array(QUESTIONS.length).fill(null);
    let currentQ = 0;
    let emailAddress = '';

    const outer = document.getElementById('screensOuter');

    // Check for saved progress
    const saved = loadProgress();
    if (saved && saved.answers && saved.answers.some(a => a !== null)) {
      const answeredCount = saved.answers.filter(a => a !== null).length;
      if (answeredCount > 0 && answeredCount < QUESTIONS.length) {
        const banner = document.getElementById('resumeBanner');
        banner.style.display = 'block';
        banner.innerHTML = `
          <div class="resume-banner">
            <div class="resume-text">👋 Welcome back - you're on question ${answeredCount + 1} of 15</div>
            <div class="resume-btns">
              <button class="resume-yes" onclick="resumeQuiz()">Continue</button>
              <button class="resume-no" onclick="startFresh()">Start over</button>
            </div>
          </div>
        `;
      } else if (answeredCount === QUESTIONS.length && saved.email) {
        // Completed - redirect to result
        const result = calculateResult(saved.answers);
        window.location.href = getResultURL(result.primary);
      }
    }

    function resumeQuiz() {
      answers = saved.answers;
      emailAddress = saved.email || '';
      document.getElementById('resumeBanner').style.display = 'none';
      // Find first unanswered
      const firstNull = answers.findIndex(a => a === null);
      currentQ = firstNull >= 0 ? firstNull : QUESTIONS.length - 1;
      updateProgress(currentQ + 1);
      showOnly(`q${currentQ}`);
    }

    function startFresh() {
      clearProgress();
      answers = new Array(QUESTIONS.length).fill(null);
      document.getElementById('resumeBanner').style.display = 'none';
      updateProgress(1);
      showOnly('q0');
    }

    // Build all screens
    function buildScreens() {
      QUESTIONS.forEach((q, i) => {
        const div = document.createElement('div');
        div.id = `q${i}`;
        div.className = 'screen';
        div.innerHTML = `
          <div class="q-eyebrow">Question ${i + 1} of ${QUESTIONS.length}</div>
          <div class="q-text">${q.q}</div>
          <div class="q-hint">${q.hint}</div>
          <div class="q-opts">
            ${q.options.map((o, j) => `
              <button class="q-opt" onclick="pick(${i},${j})">${o.t}</button>
            `).join('')}
          </div>
        `;
        outer.appendChild(div);
      });

      // Email gate
      const emailDiv = document.createElement('div');
      emailDiv.id = 'semail';
      emailDiv.className = 'screen';
      emailDiv.innerHTML = `
        <div class="email-wrap">
          <div class="email-eyebrow">almost there...</div>
          <div class="email-headline">Where should we<br>send your results?</div>
          <div class="email-sub">We'll reveal your archetype right here — and send your full brand style guide (colors, fonts, design inspiration) straight to your inbox.</div>
          <input class="email-input" type="email" placeholder="your@email.com" id="emailVal">
          <button class="email-btn" onclick="submitEmail()">Reveal my archetype ✨</button>
          <div class="email-note">No spam. Just your results.</div>
        </div>
      `;
      outer.appendChild(emailDiv);

      // Calculating
      const calcDiv = document.createElement('div');
      calcDiv.id = 'scalc';
      calcDiv.className = 'screen';
      calcDiv.innerHTML = `
        <div class="calc-wrap">
          <div class="calc-spinner-container">
            <div class="calc-ring calc-ring-1"></div>
            <div class="calc-ring calc-ring-2"></div>
            <div class="calc-ring calc-ring-3"></div>
            <div class="calc-spinner"></div>
            <div class="calc-dot calc-dot-1"></div>
            <div class="calc-dot calc-dot-2"></div>
            <div class="calc-dot calc-dot-3"></div>
          </div>
          <div class="calc-title">Calculating...</div>
          <div class="calc-sub" id="calcSub">Reading your answers</div>
        </div>
      `;
      outer.appendChild(calcDiv);

      // Reveal screen (populated dynamically after calculation)
      const revealDiv = document.createElement('div');
      revealDiv.id = 'sreveal';
      revealDiv.className = 'screen';
      revealDiv.innerHTML = `
        <div class="reveal-wrap">
          <div class="reveal-eyebrow">your brand archetype is...</div>
          <div class="reveal-the">The</div>
          <div class="reveal-name" id="revealName"></div>
          <div class="reveal-teaser" id="revealTeaser"></div>
          <div class="reveal-divider"></div>
          <div class="reveal-inbox">Check your inbox</div>
          <div class="reveal-inbox-sub">We just sent your full brand style guide — colors, fonts, design inspiration, and everything you need to build a website that feels like you.</div>
        </div>
      `;
      outer.appendChild(revealDiv);
    }

    function showOnly(id) {
      const currentActive = outer.querySelector('.screen.active');
      const nextEl = document.getElementById(id);
      if (!nextEl) return;

      if (currentActive && currentActive.id !== id) {
        // Slide out current, then slide in next
        currentActive.classList.add('slide-out');
        currentActive.addEventListener('animationend', function handler() {
          currentActive.removeEventListener('animationend', handler);
          currentActive.classList.remove('active', 'slide-out');
          nextEl.style.animation = 'none';
          nextEl.offsetHeight; // reflow
          nextEl.style.animation = '';
          nextEl.classList.add('active');
        }, { once: true });
      } else {
        outer.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        nextEl.classList.add('active');
      }
    }

    function triggerSparkle() {
      const fill = document.getElementById('progFill');
      let sparkle = fill.querySelector('.prog-sparkle');
      if (!sparkle) {
        sparkle = document.createElement('div');
        sparkle.className = 'prog-sparkle';
        for (let i = 0; i < 6; i++) {
          const s = document.createElement('div');
          s.className = 'spark';
          sparkle.appendChild(s);
        }
        fill.appendChild(sparkle);
      }
      // Reset animation
      sparkle.classList.remove('burst');
      void sparkle.offsetHeight;
      sparkle.classList.add('burst');
    }

    function updateProgress(n) {
      const pct = Math.round((n / QUESTIONS.length) * 100);
      document.getElementById('progFill').style.width = pct + '%';
      document.getElementById('progLabel').textContent = `question ${n} of ${QUESTIONS.length}`;
      triggerSparkle();
    }

    function pick(qi, ai) {
      answers[qi] = ai;
      saveProgress(answers, emailAddress);

      // Visual feedback
      const btns = document.querySelectorAll(`#q${qi} .q-opt`);
      btns.forEach((b, j) => {
        if (j === ai) b.classList.add('picked');
        else b.style.opacity = '0.4';
        b.disabled = true;
      });

      setTimeout(() => {
        if (qi < QUESTIONS.length - 1) {
          currentQ = qi + 1;
          updateProgress(currentQ + 1);
          showOnly(`q${currentQ}`);
        } else {
          document.getElementById('progWrap').style.opacity = '0';
          showOnly('semail');
        }
      }, 350);
    }

    // Kit (ConvertKit) tag IDs for each archetype result
    const KIT_TAG_IDS = {
      magician: 17757527,
      caregiver: 17757530,
      rebel: 17757531,
      sage: 17757534,
      hero: 17757536,
      lover: 17757537,
      creator: 17757538,
      explorer: 17757539,
      ruler: 17757540,
      innocent: 17757543,
      jester: 17757544,
      everyperson: 17757547
    };
    const KIT_FORM_ID = '9234357';

    // Supabase logging
    const SUPABASE_URL = 'https://rcchpjkcrzwezjpqkcmm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjY2hwamtjcnp3ZXpqcHFrY21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzMyNzMsImV4cCI6MjA4OTM0OTI3M30._cGF2WKJOJ-F9IFsCpXklDnwwy-fnBggXujvEHanBEs';

    function logToSupabase(email, archetype, answers) {
      fetch(`${SUPABASE_URL}/rest/v1/quiz_submissions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({ email, archetype, answers })
      }).catch(err => console.warn('Supabase log error:', err));
    }

    function subscribeToKit(email, archetype) {
      const tagId = KIT_TAG_IDS[archetype];
      const formData = new FormData();
      formData.append('email_address', email);
      if (tagId) formData.append('tags[]', tagId);

      // Try both Kit endpoints (kit.com is the new domain)
      fetch(`https://app.kit.com/forms/${KIT_FORM_ID}/subscribe`, {
        method: 'POST',
        body: formData,
      }).then(res => {
        if (!res.ok) console.warn('Kit response:', res.status);
      }).catch(err => console.warn('Kit subscription error:', err));
    }

    const ARCHETYPE_TEASERS = {
      hero: { name: 'Hero', teaser: 'Your brand is built on results and resilience. People come to you when the stakes are real — and you deliver every time.' },
      magician: { name: 'Magician', teaser: 'Your brand makes transformation feel effortless. You see what others miss and turn it into something that feels like magic.' },
      caregiver: { name: 'Caregiver', teaser: 'Your brand holds space. Clients don\'t just get results — they feel genuinely taken care of from the very first interaction.' },
      rebel: { name: 'Rebel', teaser: 'Your brand challenges the status quo. You say what everyone\'s thinking but won\'t say — and your audience loves you for it.' },
      sage: { name: 'Sage', teaser: 'Your brand is built on trust and expertise. People leave every interaction with you feeling smarter, not smaller.' },
      creator: { name: 'Creator', teaser: 'Your brand carries a signature that\'s undeniably yours. You don\'t follow templates — you make them.' },
      explorer: { name: 'Explorer', teaser: 'Your brand is built on independence and possibility. You don\'t follow maps — you make them.' },
      lover: { name: 'Lover', teaser: 'Your brand is built on intimacy and aesthetics. Every touchpoint is considered — clients come for the experience as much as the results.' },
      ruler: { name: 'Ruler', teaser: 'Your brand is built on authority and excellence. Every detail is intentional, every system designed, every result trackable.' },
      innocent: { name: 'Innocent', teaser: 'Your brand is built on clarity and ease. You strip away the noise and get to what actually matters.' },
      jester: { name: 'Jester', teaser: 'Your brand makes people feel alive. You bring energy, wit, and warmth to everything you do — and your audience can\'t get enough.' },
      everyperson: { name: 'Everyperson', teaser: 'Your brand is built on relatability and trust. You\'re not performing — you\'re just genuinely yourself, and that\'s what connects.' }
    };

    function submitEmail() {
      const val = document.getElementById('emailVal').value.trim();
      const input = document.getElementById('emailVal');
      if (!val || !val.includes('@') || !val.includes('.')) {
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 500);
        return;
      }
      emailAddress = val;
      saveProgress(answers, emailAddress);

      // Calculate result early so we can tag the subscriber
      const result = calculateResult(answers);

      // Subscribe to Kit with archetype tag (fire and forget)
      subscribeToKit(emailAddress, result.primary);

      // Log submission to Supabase
      logToSupabase(emailAddress, result.primary, answers);

      showOnly('scalc');
      const msgs = ["Reading your answers", "Mapping your personality", "Finding your archetype", "Almost ready..."];
      let t = 0;
      const iv = setInterval(() => {
        t++;
        const el = document.getElementById('calcSub');
        if (el && t < msgs.length) el.textContent = msgs[t];
      }, 650);

      setTimeout(() => {
        clearInterval(iv);
        saveProgress(answers, emailAddress);
        // Show reveal screen instead of redirecting
        const info = ARCHETYPE_TEASERS[result.primary] || { name: result.primary, teaser: '' };
        document.getElementById('revealName').textContent = info.name + '.';
        document.getElementById('revealTeaser').textContent = info.teaser;
        showOnly('sreveal');
      }, 2800);
    }

    buildScreens();
    showOnly('q0');
  </script>
</body>
</html>
